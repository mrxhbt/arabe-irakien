<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>عربي — Arabe irakien</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff8f3;--surface:#ffffff;--surface2:#fff0e6;--border:#f5d9c8;
  --gold:#e05c00;--gold-light:#f4894a;--sand:#2a1200;--sand-dim:#7a3d10;
  --red:#c0392b;--green:#1a6e3c;--blue:#1a5fa0;--text:#2a1200;--text-dim:#b06030;
  --pink:#d42060;--pink-light:#f0609a;--orange:#e05c00;--ocre:#b85c00;
  --radius:14px;--font-display:"Plus Jakarta Sans",sans-serif;--font-mono:"DM Mono",monospace;--font-arabic:"Noto Naskh Arabic",serif;
}
body{
  background:var(--bg);
  background-image:
    radial-gradient(circle at 15% 15%,rgba(224,92,0,.07) 0%,transparent 45%),
    radial-gradient(circle at 85% 85%,rgba(212,32,96,.07) 0%,transparent 45%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e05c00' fill-opacity='0.03'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden
}
header{
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;
  background:rgba(255,248,243,.95);backdrop-filter:blur(8px);
}
.logo{font-size:18px;font-weight:600;color:var(--orange)}
.logo span{color:var(--sand-dim);font-weight:400;font-size:12px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}
.level-badge{font-family:var(--font-mono);font-size:10px;background:var(--surface2);border:2px solid var(--border);padding:5px 11px;border-radius:20px;color:var(--orange);}
.notif-btn{font-family:var(--font-mono);font-size:10px;background:transparent;border:2px solid var(--border);padding:5px 11px;border-radius:20px;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.notif-btn.active{border-color:var(--green);color:var(--green)}
.notif-btn:hover{border-color:var(--orange);color:var(--orange)}
.progress-bar-wrap{padding:10px 18px;border-bottom:2px solid var(--border);background:rgba(255,248,243,.95)}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;font-family:var(--font-mono);color:var(--text-dim);margin-bottom:5px}
.progress-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--pink));border-radius:4px;transition:width 1s ease}
main{max-width:700px;margin:0 auto;padding:24px 16px 100px}
#setup-screen{text-align:center;padding:40px 20px}
.setup-title{font-size:28px;font-weight:600;color:var(--orange);margin-bottom:8px}
.setup-sub{font-size:14px;color:var(--text-dim);margin-bottom:32px}
.setup-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:left;box-shadow:0 2px 12px rgba(224,92,0,.06)}
.setup-label{font-family:var(--font-mono);font-size:10px;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.setup-input{width:100%;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:12px 14px;border-radius:10px;outline:none;transition:border .15s;}
.setup-input:focus{border-color:var(--orange)}
.setup-hint{font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic}
.setup-warning{background:rgba(192,57,43,.06);border:2px solid rgba(192,57,43,.2);border-radius:10px;padding:12px 16px;font-size:12px;color:#b02010;margin-top:12px;line-height:1.6}
.lesson-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 16px rgba(224,92,0,.06)}
.lesson-header{padding:20px 22px 16px;border-bottom:2px solid var(--border);background:linear-gradient(135deg,rgba(224,92,0,.04),rgba(212,32,96,.04))}
.lesson-tag{font-family:var(--font-mono);font-size:9px;color:var(--orange);letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase;font-weight:500}
.lesson-title{font-size:21px;font-weight:600;color:var(--sand);line-height:1.2}
.lesson-sub{font-size:12px;color:var(--text-dim);margin-top:4px}
.lesson-ar{font-family:var(--font-arabic);font-size:26px;color:var(--orange);direction:rtl;text-align:right;margin-top:8px}
.snav{display:flex;border-bottom:2px solid var(--border)}
.snav-btn{flex:1;padding:11px 4px;font-family:var(--font-mono);font-size:9px;background:none;border:none;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;margin-bottom:-2px;}
.snav-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-content{display:none;animation:fadeIn .3s ease}.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section{padding:20px 22px;border-bottom:2px solid var(--border)}.section:last-child{border-bottom:none}
.section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:"";flex:1;height:1px;background:var(--border)}
.lesson-content{font-size:14px;line-height:1.8;color:var(--sand-dim)}
.lesson-content h3{font-size:15px;font-weight:600;color:var(--sand);margin:16px 0 8px}
.lesson-content .callout{background:linear-gradient(135deg,rgba(224,92,0,.06),rgba(212,32,96,.04));border-left:3px solid var(--orange);border-radius:0 10px 10px 0;padding:12px 16px;margin:12px 0;font-size:13px;line-height:1.7;color:var(--sand-dim);}
.lesson-content strong{color:var(--sand)}
.lesson-content .ar-text{font-family:var(--font-arabic);font-size:20px;color:var(--orange);direction:rtl;text-align:right;display:block;margin:8px 0}
.lesson-content .translit{font-family:var(--font-mono);font-size:12px;color:var(--sand-dim);font-style:italic}
.grammar-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.grammar-table th{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);}
.grammar-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.grammar-table tr:last-child td{border-bottom:none}
.grammar-table tr:hover td{background:rgba(224,92,0,.04)}
.ar-cell{font-family:var(--font-arabic);font-size:19px;color:var(--orange);direction:rtl;text-align:right}
.tr-cell{font-family:var(--font-mono);font-size:11px;color:var(--sand-dim);font-style:italic}
.exercise-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}.exercise-block:last-of-type{border-bottom:none}
.ex-label{font-family:var(--font-mono);font-size:9px;color:var(--pink);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;font-weight:500}
.ex-question{font-size:14px;color:var(--sand);margin-bottom:12px;line-height:1.6}
.mcq-options{display:flex;flex-direction:column;gap:7px}
.mcq-opt{display:flex;align-items:center;gap:10px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;font-size:13px;transition:all .15s;user-select:none;}
.mcq-opt:active{transform:scale(.98)}
.mcq-opt:hover{border-color:var(--orange);background:rgba(224,92,0,.04)}
.mcq-opt.correct{border-color:var(--green)!important;background:rgba(26,110,60,.08)!important;color:var(--green)!important}
.mcq-opt.wrong{border-color:var(--red)!important;background:rgba(192,57,43,.06)!important;color:var(--red)!important}
.mcq-opt .ar-opt{font-family:var(--font-arabic);font-size:17px;margin-left:auto;color:var(--orange)}
.text-input-wrap{display:flex;gap:8px;align-items:flex-start}
.arab-input{flex:1;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:var(--font-arabic);font-size:19px;padding:10px 13px;border-radius:10px;outline:none;direction:rtl;transition:border .15s;}
.arab-input:focus{border-color:var(--orange)}
.arab-input.correct{border-color:var(--green)!important;background:rgba(26,110,60,.06)}
.arab-input.wrong{border-color:var(--red)!important;background:rgba(192,57,43,.06)}
.feedback{margin-top:10px;font-size:12px;padding:9px 13px;border-radius:8px;display:none;font-family:var(--font-mono);line-height:1.5}
.feedback.ok{background:rgba(26,110,60,.08);color:var(--green);border:1px solid rgba(26,110,60,.2);display:block}
.feedback.ko{background:rgba(192,57,43,.06);color:#c0392b;border:1px solid rgba(192,57,43,.2);display:block}
.vocab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.vocab-card{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.vocab-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(224,92,0,.1);transform:translateY(-2px)}
.vocab-card:active{transform:scale(.97)}
.v-ar{font-family:var(--font-arabic);font-size:23px;color:var(--orange);direction:rtl;display:block;margin-bottom:4px}
.v-tr{font-family:var(--font-mono);font-size:10px;color:var(--sand-dim);font-style:italic;display:block;margin-bottom:3px}
.v-fr{font-size:12px;color:var(--text);display:block;transition:filter .2s}
.v-fr.blurred{filter:blur(4px)}
.v-hint{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:5px;letter-spacing:.5px}
.srs-card{background:linear-gradient(135deg,var(--surface2),rgba(212,32,96,.04));border:2px solid var(--border);border-radius:var(--radius);padding:32px 24px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.srs-ar{font-family:var(--font-arabic);font-size:48px;color:var(--orange);direction:rtl;margin-bottom:12px}
.srs-q{font-size:12px;color:var(--text-dim);margin-bottom:20px;font-family:var(--font-mono)}
.srs-answer{font-size:15px;color:var(--sand);margin:14px 0;padding:12px 20px;background:var(--surface);border:2px solid var(--border);border-radius:10px;display:none}
.srs-answer.show{display:block}
.srs-tr{font-family:var(--font-mono);font-size:12px;color:var(--sand-dim);font-style:italic;margin-top:4px}
.srs-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.srs-counter{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:16px}
.btn{font-family:var(--font-mono);font-size:11px;letter-spacing:.5px;padding:10px 20px;border-radius:10px;border:2px solid var(--orange);background:transparent;color:var(--orange);cursor:pointer;transition:all .2s;user-select:none;font-weight:500}
.btn:active{transform:scale(.97)}
.btn:hover{background:var(--orange);color:#fff}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--ocre)}
.btn-sm{padding:8px 14px;font-size:10px}
.btn-red{border-color:var(--red);color:var(--red)}.btn-red:hover{background:var(--red);color:#fff}
.btn-orange{border-color:#d4810a;color:#d4810a}.btn-orange:hover{background:#d4810a;color:#fff}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:#fff}
.score-wrap{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(224,92,0,.06),rgba(212,32,96,.04));border:2px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:20px}
.score-num{font-size:28px;font-weight:600;color:var(--orange);font-family:var(--font-mono)}
.score-lbl{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.5px}
.loading-wrap{text-align:center;padding:48px 20px}
.loading-ar{font-family:var(--font-arabic);font-size:40px;color:var(--orange);margin-bottom:12px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:var(--text-dim)}
.complete-wrap{text-align:center;padding:40px 20px}
.complete-icon{font-size:48px;margin-bottom:12px}
.complete-title{font-size:24px;font-weight:600;color:var(--orange);margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px}
.quiz-banner{background:linear-gradient(135deg,rgba(212,32,96,.06),rgba(224,92,0,.04));border:2px solid rgba(212,32,96,.2);border-radius:12px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;color:var(--sand-dim);}
.quiz-banner strong{color:var(--pink);font-size:11px;font-family:var(--font-mono);letter-spacing:.5px;display:block;margin-bottom:4px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,248,243,.95);backdrop-filter:blur(8px);border-top:2px solid var(--border);display:flex;z-index:50}
.bnav-btn{flex:1;padding:12px 4px 14px;font-family:var(--font-mono);font-size:9px;background:none;border:none;color:var(--text-dim);cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.5px;transition:color .15s;}
.bnav-btn.active{color:var(--orange)}
.bnav-icon{font-size:18px;display:block;margin-bottom:2px}
.error-box{background:rgba(192,57,43,.06);border:2px solid rgba(192,57,43,.2);border-radius:12px;padding:16px 20px;font-size:13px;color:#c0392b;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="logo">عربي <span>Irakien</span></div>
  <div class="header-right">
    <button class="notif-btn" id="notif-btn" onclick="requestNotifications()">🔔 Notifs</button>
    <div class="level-badge" id="level-badge">A1 · J1</div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-labels">
    <span id="prog-label">Début du parcours</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<main id="main-content">
  <!-- Contenu dynamique -->
</main>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-lesson" onclick="showView('lesson')">
    <span class="bnav-icon">📖</span>Leçon
  </button>
  <button class="bnav-btn" id="bnav-vocab" onclick="showView('vocab')">
    <span class="bnav-icon">📚</span>Vocab
  </button>
  <button class="bnav-btn" id="bnav-srs" onclick="showView('srs')">
    <span class="bnav-icon">🔁</span>Révision
  </button>
  <button class="bnav-btn" id="bnav-dico" onclick="showView('dico')">
    <span class="bnav-icon">🗂️</span>Dico
  </button>
  <button class="bnav-btn" id="bnav-settings" onclick="showView('settings')">
    <span class="bnav-icon">⚙️</span>Réglages
  </button>
</nav>

<script>
// ============================================================
// STATE
// ============================================================
let STATE = {
  apiKey: '',
  dayNumber: 1,
  totalDays: 0,
  level: 'A1',
  history: [], // [{day, title, vocab:[]}]
  currentLesson: null,
  currentView: 'lesson',
  notificationsEnabled: false,
  exerciseScores: {},
  srsQueue: [],
  srsIdx: 0,
  dicoSearch: '',
};

const TOTAL_LESSONS_A1 = 40;
const TOTAL_LESSONS_A2 = 80;

// ============================================================
// PERSISTENCE
// ============================================================
function saveState(){
  try{ localStorage.setItem('arabi_state', JSON.stringify(STATE)); }catch(e){}
}
function loadState(){
  try{
    const s = localStorage.getItem('arabi_state');
    if(s){ STATE = {...STATE, ...JSON.parse(s)}; }
  }catch(e){}
}

// ============================================================
// INIT
// ============================================================
window.onload = function(){
  loadState();
  if(!STATE.apiKey){
    renderSetup();
  } else {
    initApp();
  }
};

function renderSetup(){
  document.getElementById('main-content').innerHTML = `
  <div id="setup-screen">
    <div style="font-family:var(--font-arabic);font-size:48px;color:var(--gold);margin-bottom:12px">مرحبا</div>
    <div class="setup-title">Bienvenue</div>
    <div class="setup-sub">Arabe irakien · A1 → A2 → B1</div>

    <div class="setup-card">
      <div class="setup-label">Clé API Anthropic</div>
      <input class="setup-input" type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <div class="setup-hint">Disponible sur console.anthropic.com → API Keys. Elle reste stockée uniquement sur ton téléphone.</div>
    </div>

    <div class="setup-warning">
      ⚠️ Assure-toi d'avoir fixé un plafond de dépense mensuel sur console.anthropic.com → Billing → Usage limits avant de continuer.
    </div>

    <div style="margin-top:20px">
      <button class="btn btn-primary" style="width:100%;padding:14px" onclick="saveApiKey()">Commencer l'apprentissage →</button>
    </div>
  </div>`;
}

function saveApiKey(){
  const key = document.getElementById('api-key-input').value.trim();
  if(!key.startsWith('sk-ant-') && !key.startsWith('sk-')){
    alert('Clé API invalide. Elle doit commencer par sk-ant-');
    return;
  }
  STATE.apiKey = key;
  STATE.dayNumber = 1;
  STATE.totalDays = 0;
  STATE.history = [];
  saveState();
  initApp();
}

function initApp(){
  updateProgressBar();
  checkDayAndLoad();
  scheduleNotification();
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgressBar(){
  const total = TOTAL_LESSONS_A1 + TOTAL_LESSONS_A2;
  const done = STATE.totalDays;
  const pct = Math.min(Math.round((done/total)*100), 100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';

  let lvl, lbl;
  if(done < TOTAL_LESSONS_A1){
    lvl = 'A1'; lbl = `A1 · Leçon ${done+1}/${TOTAL_LESSONS_A1}`;
  } else if(done < TOTAL_LESSONS_A1 + TOTAL_LESSONS_A2){
    lvl = 'A2'; lbl = `A2 · Leçon ${done-TOTAL_LESSONS_A1+1}/${TOTAL_LESSONS_A2}`;
  } else {
    lvl = 'B1'; lbl = `B1 en cours`;
  }
  STATE.level = lvl;
  document.getElementById('level-badge').textContent = lbl;
}

// ============================================================
// DAY CHECK — une leçon par jour
// ============================================================
function checkDayAndLoad(){
  const today = new Date().toDateString();
  const lastDay = STATE.lastLessonDate;

  if(STATE.currentLesson && lastDay === today){
    // Leçon déjà générée aujourd'hui
    renderLessonView();
  } else if(lastDay !== today){
    // Nouvelle journée → générer
    generateDailyLesson();
  } else {
    renderLessonView();
  }
}

// ============================================================
// GENERATE LESSON VIA CLAUDE API
// ============================================================
async function generateDailyLesson(){
  renderLoading();

  const day = STATE.dayNumber;
  const history = STATE.history.slice(-5).map(h => h.title).join(', ');
  const prevLesson = STATE.history.length > 0 ? STATE.history[STATE.history.length-1] : null;

  const level = STATE.level;
  const lessonNum = STATE.totalDays + 1;

  // Progression curriculum
  const a1Topics = [
    "les pronoms personnels (āna, inta, inti, huwwa, hiyya, iḥna, intu, humma)",
    "le verbe être en irakien (mâku verbe être explicite, utilisation des pronoms seuls)",
    "se présenter : nom, nationalité, ville",
    "les chiffres de 1 à 10",
    "les chiffres de 11 à 100",
    "la famille : père, mère, frère, sœur, fils, fille",
    "les jours de la semaine et les mois",
    "les couleurs essentielles",
    "le présent simple : verbes courants (yākul, yishrab, yirūḥ, yiji)",
    "la maison et les pièces",
    "les aliments et les boissons",
    "poser des questions simples (shunu, mīnu, wēn, shgadd)",
    "la négation (mā, mū, mâku)",
    "le passé simple : verbes courants",
    "le futur : rāḥ + verbe",
    "les adjectifs courants (kbīr, zghīr, zēn, mū zēn)",
    "les directions et se repérer dans la ville",
    "au marché : acheter et négocier",
    "la santé : chez le médecin",
    "le temps qu'il fait",
    "les transports (taksi, bās, sayyāra)",
    "au restaurant : commander un repas",
    "les vêtements",
    "les professions",
    "les loisirs et hobbies",
    "exprimer ses goûts (aḥib, mā aḥib)",
    "les prépositions de lieu (fōg, taḥat, jiddam, wara)",
    "parler de sa journée",
    "le téléphone et les messages",
    "révision A1 complète + mini-dialogue",
  ];

  const a2Topics = [
    "le duel et le pluriel irrégulier",
    "les pronoms suffixes (possessifs : bayti, bētak...)",
    "les verbes à double complément",
    "exprimer la durée et la fréquence",
    "la forme passive en irakien",
    "les subordonnées temporelles (lamma, baad mā)",
    "exprimer la cause (li'ann, mishan)",
    "exprimer le but",
    "les comparatifs et superlatifs",
    "les nombres ordinaux",
    "parler de ses projets et ambitions",
    "décrire une personne physiquement",
    "décrire le caractère de quelqu'un",
    "raconter une histoire au passé",
    "rapporter les paroles de quelqu'un",
    "exprimer des opinions et les défendre",
    "vocabulaire professionnel et bureau",
    "écrire un message formel",
    "comprendre et donner des instructions complexes",
    "révision A2 + conversation libre",
  ];

  let topicToTeach;
  if(lessonNum <= a1Topics.length){
    topicToTeach = a1Topics[lessonNum-1];
  } else if(lessonNum <= a1Topics.length + a2Topics.length){
    topicToTeach = a2Topics[lessonNum - a1Topics.length - 1];
  } else {
    topicToTeach = `conversation avancée B1 - thème libre de niveau B1 en arabe irakien (leçon ${lessonNum})`;
  }

  const quizInstructions = prevLesson ? `
QUIZ SUR LA LEÇON PRÉCÉDENTE (obligatoire, avant la nouvelle leçon) :
La leçon précédente portait sur : "${prevLesson.title}"
Génère 3 questions de quiz sur cette leçon. Format JSON strict dans le champ "quiz".
` : '';

  const prompt = `Tu es un professeur expert en arabe irakien dialectal (dialecte de Bagdad).
Tu dois générer la leçon numéro ${lessonNum} pour un apprenant francophone de niveau ${level}.

Sujet de cette leçon : ${topicToTeach}
Leçons déjà vues : ${history || 'aucune'}

${quizInstructions}

Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans balises, sans texte avant ou après.

Structure JSON obligatoire :
{
  "title": "titre court de la leçon en français",
  "titleAr": "titre en arabe",
  "tag": "${level} · Leçon ${lessonNum}",
  "quiz": ${prevLesson ? `[
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "a", "explanation": "..."},
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "b", "explanation": "..."},
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "c", "explanation": "..."}
  ]` : 'null'},
  "explanation": "Explication claire en français, 3-4 paragraphes. Style direct et pédagogique. Mentionne les particularités irakiennes vs arabe standard. Durée de lecture : 5-7 minutes.",
  "phonetics": "Guide de prononciation en français courant pour les sons difficiles de cette leçon. Par exemple : le son ح se prononce comme un H très soufflé du fond de la gorge, le ع est un son guttural sans équivalent français, le خ ressemble au R allemand dans Bach. Explique uniquement les sons présents dans les mots de CETTE leçon, 3-5 lignes maximum.",
  "table": [
    {"ar": "arabe", "tr": "translittération", "fr": "français", "example": "phrase exemple courte", "prononciation": "description courte de la prononciation en français courant, ex: o-na, ou: le a final est bref"},
    ...8 à 10 entrées...
  ],
  "tip": "Une astuce ou règle mémo-technique courte et percutante",
  "exercises": [
    {
      "type": "mcq",
      "question": "Question en français",
      "options": [
        {"key": "a", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "b", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "c", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "d", "ar": "arabe", "tr": "translit", "fr": "français"}
      ],
      "correct": "b",
      "explanation": "Explication de la bonne réponse"
    },
    {
      "type": "mcq",
      "question": "Deuxième question",
      "options": [...],
      "correct": "c",
      "explanation": "..."
    },
    {
      "type": "fill",
      "question": "Traduisez en arabe : [phrase courte]",
      "hint": "translittération pour aider",
      "answer": "réponse en arabe",
      "answerAlt": ["variante acceptable si existe", ""],
      "explanation": "Explication"
    },
    {
      "type": "fill",
      "question": "Traduisez en arabe : [autre phrase]",
      "hint": "translittération",
      "answer": "réponse",
      "answerAlt": [],
      "explanation": "Explication"
    }
  ],
  "vocab": [
    {"ar": "mot", "tr": "translit", "fr": "français"},
    ...8 mots...
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': STATE.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!response.ok){
      const err = await response.json();
      throw new Error(err.error?.message || 'Erreur API');
    }

    const data = await response.json();
    let text = data.content.map(c => c.text || '').join('');

    // Clean JSON
    text = text.replace(/```json|```/g, '').trim();
    const lesson = JSON.parse(text);

    // Save
    STATE.currentLesson = lesson;
    STATE.lastLessonDate = new Date().toDateString();
    STATE.history.push({ day: STATE.dayNumber, title: lesson.title, vocab: lesson.vocab });
    STATE.totalDays = STATE.history.length;
    STATE.dayNumber++;
    STATE.exerciseScores = {};
    STATE.srsQueue = [...lesson.vocab].sort(() => Math.random() - .5);
    STATE.srsIdx = 0;
    saveState();
    updateProgressBar();
    renderLessonView();

  } catch(e) {
    renderError(e.message);
  }
}

// ============================================================
// DICTIONARY VIEW — tous les mots appris, leçon par leçon
// ============================================================
function renderDicoView(){
  const history = STATE.history || [];
  const allWords = [];
  history.forEach(h => {
    if(h.vocab && h.vocab.length){
      h.vocab.forEach(w => allWords.push({...w, lesson: h.title, day: h.day}));
    }
  });

  const total = allWords.length;

  // Filtre + recherche
  const searchVal = STATE.dicoSearch || '';
  const filtered = searchVal
    ? allWords.filter(w =>
        w.fr?.toLowerCase().includes(searchVal.toLowerCase()) ||
        w.ar?.includes(searchVal) ||
        w.tr?.toLowerCase().includes(searchVal.toLowerCase()) ||
        w.lesson?.toLowerCase().includes(searchVal.toLowerCase())
      )
    : allWords;

  // Grouper par leçon
  const byLesson = {};
  filtered.forEach(w => {
    const key = w.lesson || 'Leçon inconnue';
    if(!byLesson[key]) byLesson[key] = [];
    byLesson[key].push(w);
  });

  let groupsHTML = '';
  if(filtered.length === 0){
    groupsHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim);font-style:italic">
      ${total === 0 ? 'Aucun mot encore appris. Commence ta première leçon !' : 'Aucun résultat pour cette recherche.'}
    </div>`;
  } else {
    // Affichage inversé : leçons les plus récentes en premier
    const lessonKeys = Object.keys(byLesson).reverse();
    groupsHTML = lessonKeys.map(lesson => `
      <div style="margin-bottom:24px">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px">
          ${lesson}
          <span style="color:var(--text-dim)">(${byLesson[lesson].length} mots)</span>
          <span style="flex:1;height:1px;background:var(--border);display:block"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px">
          ${byLesson[lesson].map(w => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border-radius:7px;transition:background .15s" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='var(--surface2)'">
            <span style="font-family:var(--font-arabic);font-size:20px;color:var(--gold);min-width:60px;text-align:right;direction:rtl">${w.ar}</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--sand-dim);font-style:italic;min-width:90px">${w.tr}</span>
            <span style="font-size:13px;color:var(--text)">${w.fr}</span>
          </div>`).join('')}
        </div>
      </div>`).join('');
  }

  document.getElementById('main-content').innerHTML = `
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Dictionnaire personnel</div>
      <div class="lesson-title">Mots appris</div>
      <div class="lesson-sub">${total} mot${total>1?'s':''} · ${history.length} leçon${history.length>1?'s':''} complétée${history.length>1?'s':''}</div>
    </div>
    <div style="padding:14px 18px;border-bottom:1px solid var(--border)">
      <input
        type="search"
        placeholder="Rechercher un mot (français, arabe, translit.)…"
        value="${searchVal}"
        oninput="STATE.dicoSearch=this.value; renderDicoView()"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:10px 14px;border-radius:8px;outline:none;"
        onfocus="this.style.borderColor='var(--gold)'"
        onblur="this.style.borderColor='var(--border)'"
      >
    </div>
    <div style="padding:16px 18px 24px">
      ${total > 0 ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-bottom:16px">${filtered.length} résultat${filtered.length>1?'s':''} · ordre antéchronologique</div>` : ''}
      ${groupsHTML}
    </div>
  </div>`;
}

function formatExplanation(text){
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p style="margin-top:12px">')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function forvoUrl(ar){
  const word = encodeURIComponent(ar.trim());
  return `https://forvo.com/search/${word}/ar/`;
}

  return `

      <th style="text-align:right">Arabe</th>
      <th>Translit.</th>

      <th>Français · Exemple</th>
    </tr></thead>
    <tbody>
      ${table.map(r=>`<tr>
        <td class="ar-cell">
          <a href="${forvoUrl(r.ar||'')}" target="_blank" rel="noopener"
            style="text-decoration:none;color:var(--orange)"
            title="Entendre sur Forvo">${r.ar||''}</a>
          <span style="display:block;font-size:9px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px">🔊 Forvo</span>
        </td>

        <td style="font-size:11px;color:var(--sand-dim);font-style:italic;line-height:1.5">${r.prononciation||'—'}</td>

function renderExercisesHTML(exercises){
  if(!exercises) return '';
  return exercises.map((ex, i) => {
    if(ex.type === 'mcq'){
      return `
      <div class="exercise-block" id="ex-block-${i}">
        <span class="ex-label">QCM ${i+1}</span>
        <div class="ex-question">${ex.question}</div>
        <div class="mcq-options" id="mcq-${i}">
          ${ex.options.map(o=>`
          <div class="mcq-opt" onclick="checkMCQ(${i}, this, '${o.key}')">
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">${o.key})</span>
            <span>${o.fr||''}</span>
            <span class="ar-opt">${o.ar||''}</span>
          </div>`).join('')}
        </div>
        <div class="feedback" id="fb-${i}"></div>
      </div>`;
    } else if(ex.type === 'fill'){
      return `
      <div class="exercise-block" id="ex-block-${i}">
        <span class="ex-label">Écriture ${i+1}</span>
        <div class="ex-question">${ex.question}</div>
        ${ex.hint ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:10px;font-style:italic">Aide : ${ex.hint}</div>` : ''}
        <div class="text-input-wrap">
          <input class="arab-input" type="text" id="fill-${i}" placeholder="اكتب هنا..." onkeydown="if(event.key==='Enter')checkFill(${i})">
          <button class="btn btn-sm" onclick="checkFill(${i})">OK</button>
        </div>
        <div class="feedback" id="fb-${i}"></div>
      </div>`;
    }
    return '';
  }).join('');
}

function renderQuizHTML(quiz){
  return quiz.map((q, i) => `
  <div class="exercise-block" id="quiz-block-${i}">
    <span class="ex-label">Question ${i+1}</span>
    <div class="ex-question">${q.question}</div>
    <div class="mcq-options" id="quiz-mcq-${i}">
      ${q.options.map(o=>`
      <div class="mcq-opt" onclick="selectQuizOption(${i}, this, '${o[0]}')">
        <span>${o}</span>
      </div>`).join('')}
    </div>
  </div>`).join('');

let quizSelections = {};
function selectQuizOption(i, el, key){
  if(quizSelections[i] !== undefined) return;
  quizSelections[i] = key;
  el.style.borderColor = 'var(--gold)';
}

function submitQuiz(){
  const L = STATE.currentLesson;
  if(!L || !L.quiz) return;
  let score = 0;
  L.quiz.forEach((q, i) => {
    const opts = document.querySelectorAll(`#quiz-mcq-${i} .mcq-opt`);
    const selected = quizSelections[i];
    opts.forEach(o => {
      o.style.pointerEvents = 'none';
      const key = o.textContent.trim()[0].toLowerCase();
      if(key === q.correct) o.classList.add('correct');
      else if(selected && key === selected) o.classList.add('wrong');
    });
    if(selected === q.correct) score++;
  });
  const fb = document.getElementById('quiz-feedback');
  const pct = Math.round((score/L.quiz.length)*100);
  fb.className = score === L.quiz.length ? 'feedback ok' : 'feedback ko';
  fb.textContent = `${score}/${L.quiz.length} — ${pct >= 67 ? '✓ Bien joué !' : '✗ À revoir — consulte la leçon d\'hier.'}`;
}

// ============================================================
// EXERCISES
// ============================================================
function checkMCQ(i, el, choice){
  const L = STATE.currentLesson;
  const ex = L.exercises[i];
  const opts = el.parentElement.querySelectorAll('.mcq-opt');
  opts.forEach(o => o.style.pointerEvents = 'none');
  const fb = document.getElementById('fb-'+i);
  if(choice === ex.correct){
    el.classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = '✓ ' + (ex.explanation || 'Correct !');
    STATE.exerciseScores[i] = 1;
  } else {
    el.classList.add('wrong');
    opts.forEach(o => { if(o.querySelector('[style]')?.textContent === ex.correct+')' || o.textContent.trim().startsWith(ex.correct+')')) o.classList.add('correct'); });
    fb.className = 'feedback ko';
    fb.textContent = '✗ ' + (ex.explanation || 'Pas tout à fait.');
    STATE.exerciseScores[i] = 0;
  }
  saveState();
}

function checkFill(i){
  const L = STATE.currentLesson;
  const ex = L.exercises[i];
  const inp = document.getElementById('fill-'+i);
  const val = inp.value.trim();
  const fb = document.getElementById('fb-'+i);
  const accepted = [ex.answer, ...(ex.answerAlt||[])].filter(Boolean);
  if(accepted.includes(val)){
    inp.classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = '✓ ' + (ex.explanation || 'Parfait !');
    STATE.exerciseScores[i] = 1;
  } else {
    inp.classList.add('wrong');
    fb.className = 'feedback ko';
    fb.textContent = `✗ Réponse : ${ex.answer} — ${ex.explanation||''}`;
    STATE.exerciseScores[i] = 0;
    setTimeout(()=>{ inp.classList.remove('wrong'); inp.value=''; }, 1500);
  }
  saveState();
}

function scoreExercises(){
  const L = STATE.currentLesson;
  const total = L.exercises.length;
  let got = Object.values(STATE.exerciseScores).filter(v=>v===1).length;
  const sd = document.getElementById('score-display');
  sd.style.display = 'flex';
  document.getElementById('score-num').textContent = got+'/'+total;
  sd.scrollIntoView({behavior:'smooth'});
}

function resetExercises(){
  STATE.exerciseScores = {};
  saveState();
  renderLessonView();
  showTab(1);
}

function showTab(n){
  [0,1].forEach(i=>{
    document.getElementById('tab-'+i)?.classList.toggle('active', i===n);
    document.getElementById('snav-'+i)?.classList.toggle('active', i===n);
  });
}

// ============================================================
function renderVocabView(){
  const L = STATE.currentLesson;
  if(!L){ document.getElementById('main-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">Charge ta leçon du jour d\'abord.</div>'; return; }

  document.getElementById('main-content').innerHTML = `
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Vocabulaire</div>
      <div class="lesson-title">${L.title}</div>
      <div class="lesson-sub">Clique pour révéler · Apprends avant la révision</div>
    </div>
    <div class="section">
      <div class="vocab-grid" id="vocab-grid"></div>
    </div>
  </div>`;

  const g = document.getElementById('vocab-grid');
  (L.vocab||[]).forEach((v,i)=>{
    const c = document.createElement('div');
    c.className = 'vocab-card';
    c.innerHTML = `<span class="v-ar">${v.ar}</span><span class="v-tr">${v.tr}</span><span class="v-fr blurred" id="vfr-${i}">${v.fr}</span><span class="v-hint" id="vh-${i}">appuyer pour révéler</span>`;
    c.onclick = ()=>{
      const fr = document.getElementById('vfr-'+i);
      const h = document.getElementById('vh-'+i);
      const hidden = fr.classList.contains('blurred');
      fr.classList.toggle('blurred', !hidden);
      h.textContent = hidden ? 'appuyer pour masquer' : 'appuyer pour révéler';
    };
    g.appendChild(c);
  });
}

// ============================================================
// SRS VIEW
// ============================================================
function renderSRSView(){
  const L = STATE.currentLesson;
  if(!L || !L.vocab){ document.getElementById('main-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">Aucun vocabulaire disponible.</div>'; return; }

  if(!STATE.srsQueue || STATE.srsQueue.length === 0){
    STATE.srsQueue = [...L.vocab].sort(()=>Math.random()-.5);
    STATE.srsIdx = 0;
    saveState();
  }

  document.getElementById('main-content').innerHTML = `
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Révision espacée</div>
      <div class="lesson-title">Flashcards</div>
      <div class="lesson-sub">Mémorise · évalue-toi · repasse les difficiles</div>
    </div>
    <div class="section">
      <div class="srs-card" id="srs-card">
        <div class="srs-ar" id="srs-ar">—</div>
        <div class="srs-q">Que signifie ce mot ?</div>
        <div class="srs-answer" id="srs-answer">
          <div id="srs-fr">—</div>
          <div class="srs-tr" id="srs-tr">—</div>
        </div>
        <button class="btn btn-sm" id="srs-reveal" onclick="revealSRS()">Révéler</button>
        <div class="srs-btns" id="srs-btns" style="display:none">
          <button class="btn btn-sm btn-red" onclick="rateSRS('hard')">Difficile</button>
          <button class="btn btn-sm btn-orange" onclick="rateSRS('ok')">À revoir</button>
          <button class="btn btn-sm btn-green" onclick="rateSRS('easy')">Facile !</button>
        </div>
        <div class="srs-counter" id="srs-counter">—</div>
      </div>
      <div id="srs-done" style="display:none" class="complete-wrap">
        <div class="complete-icon">🌟</div>
        <div class="complete-title">Révision terminée !</div>
        <div class="complete-sub" style="font-family:var(--font-arabic);font-size:20px;color:var(--gold)">أحسنت — Bravo !</div>
        <div style="margin-top:20px">
          <button class="btn btn-sm" onclick="restartSRS()">↺ Recommencer</button>
        </div>
      </div>
    </div>
  </div>`;
  showSRSCard();
}

function showSRSCard(){
  const q = STATE.srsQueue;
  if(STATE.srsIdx >= q.length){ endSRS(); return; }
  const w = q[STATE.srsIdx];
  document.getElementById('srs-ar').textContent = w.ar;
  document.getElementById('srs-fr').textContent = w.fr;
  document.getElementById('srs-tr').textContent = w.tr;
  document.getElementById('srs-answer').classList.remove('show');
  document.getElementById('srs-reveal').style.display = '';
  document.getElementById('srs-btns').style.display = 'none';
  document.getElementById('srs-counter').textContent = `Carte ${STATE.srsIdx+1} / ${q.length}`;
}

function revealSRS(){
  document.getElementById('srs-answer').classList.add('show');
  document.getElementById('srs-reveal').style.display = 'none';
  document.getElementById('srs-btns').style.display = 'flex';
}

function rateSRS(level){
  if(level === 'hard') STATE.srsQueue.push(STATE.srsQueue[STATE.srsIdx]);
  STATE.srsIdx++;
  saveState();
  showSRSCard();
}

function restartSRS(){
  const L = STATE.currentLesson;
  STATE.srsQueue = [...L.vocab].sort(()=>Math.random()-.5);
  STATE.srsIdx = 0;
  saveState();
  renderSRSView();
}

function endSRS(){
  document.getElementById('srs-card').style.display = 'none';
  document.getElementById('srs-done').style.display = 'block';
}

// ============================================================
// SETTINGS VIEW
// ============================================================
function renderSettingsView(){
  const notifStatus = STATE.notificationsEnabled ? '🔔 Activées' : '🔕 Désactivées';
  document.getElementById('main-content').innerHTML = `
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Réglages</div>
      <div class="lesson-title">Configuration</div>
    </div>
    <div class="section">
      <div class="section-label">Clé API</div>
      <input class="setup-input" type="password" id="new-api-key" placeholder="Nouvelle clé sk-ant-..." value="${STATE.apiKey}">
      <div style="margin-top:10px"><button class="btn btn-sm" onclick="updateApiKey()">Mettre à jour</button></div>
    </div>
    <div class="section">
      <div class="section-label">Notifications</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Statut actuel : <strong style="color:var(--sand)">${notifStatus}</strong></p>
      <button class="btn btn-sm" onclick="requestNotifications()">Activer les notifications à 8h00</button>
      <p style="font-size:11px;color:var(--text-dim);margin-top:8px;font-style:italic">Sur Android : accepte la demande de permission qui apparaît, puis ajoute l'app à ton écran d'accueil.</p>
    </div>
    <div class="section">
      <div class="section-label">Progression</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Leçon actuelle : <strong style="color:var(--sand)">J${STATE.totalDays} · ${STATE.level}</strong></p>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Leçons complétées : <strong style="color:var(--sand)">${STATE.totalDays}</strong></p>
      <button class="btn btn-sm btn-red" onclick="confirmReset()">⚠ Réinitialiser la progression</button>
    </div>
    <div class="section">
      <div class="section-label">Générer maintenant</div>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Force la génération d'une nouvelle leçon (consomme du crédit API).</p>
      <button class="btn btn-sm" onclick="forceNewLesson()">Générer la leçon suivante</button>
    </div>
  </div>`;
}

function updateApiKey(){
  const k = document.getElementById('new-api-key').value.trim();
  if(!k){ alert('Clé vide'); return; }
  STATE.apiKey = k;
  saveState();
  alert('Clé mise à jour.');
}

function confirmReset(){
  if(confirm('Réinitialiser toute la progression ? Cette action est irréversible.')){
    STATE.dayNumber = 1;
    STATE.totalDays = 0;
    STATE.history = [];
    STATE.currentLesson = null;
    STATE.lastLessonDate = null;
    STATE.exerciseScores = {};
    STATE.srsQueue = [];
    STATE.srsIdx = 0;
    saveState();
    updateProgressBar();
    showView('lesson');
  }
}

function forceNewLesson(){
  if(confirm('Générer une nouvelle leçon ? Ta leçon actuelle sera remplacée.')){
    STATE.lastLessonDate = null;
    saveState();
    generateDailyLesson();
  }
}

// ============================================================
// NOTIFICATIONS (PWA)
// ============================================================
async function requestNotifications(){
  if(!('Notification' in window)){
    alert('Les notifications ne sont pas supportées sur ce navigateur. Essaie d\'ajouter l\'app à ton écran d\'accueil Android depuis Chrome.');
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    STATE.notificationsEnabled = true;
    saveState();
    document.getElementById('notif-btn').classList.add('active');
    document.getElementById('notif-btn').textContent = '🔔 OK';
    scheduleNotification();
    new Notification('عربي — Arabe irakien', {
      body: 'Notifications activées ! Tu recevras ta leçon chaque matin à 8h00.',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>'
    });
  } else {
    alert('Permission refusée. Active les notifications dans les réglages de Chrome.');
  }
}

function scheduleNotification(){
  if(!STATE.notificationsEnabled) return;
  if(!('Notification' in window) || Notification.permission !== 'granted') return;

  // Calcule le délai jusqu'à 8h00 demain
  const now = new Date();
  const next8 = new Date();
  next8.setHours(8, 0, 0, 0);
  if(now >= next8) next8.setDate(next8.getDate() + 1);
  const delay = next8 - now;

  setTimeout(()=>{
    const lastDate = STATE.lastLessonDate;
    const today = new Date().toDateString();
    if(lastDate !== today){
      new Notification('عربي — Leçon du jour prête !', {
        body: `Bonjour ! Ta leçon d'arabe irakien t'attend. ${STATE.level} · Leçon ${STATE.totalDays+1}`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>',
        requireInteraction: true
      });
    }
    scheduleNotification(); // Replanifie pour demain
  }, delay);

  document.getElementById('notif-btn').classList.add('active');
  document.getElementById('notif-btn').textContent = '🔔 8h00';
}

// Init notif button state
if(STATE.notificationsEnabled){
  document.getElementById('notif-btn').classList.add('active');
  document.getElementById('notif-btn').textContent = '🔔 8h00';
}
</script>
