<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>عربي — Arabe irakien</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff8f3;--surface:#ffffff;--surface2:#fff0e6;--border:#f5d9c8;
  --gold:#e05c00;--gold-light:#f4894a;--sand:#2a1200;--sand-dim:#7a3d10;
  --red:#c0392b;--green:#1a6e3c;--blue:#1a5fa0;--text:#2a1200;--text-dim:#b06030;
  --pink:#d42060;--orange:#e05c00;--ocre:#b85c00;
  --radius:14px;--font-display:"Plus Jakarta Sans",sans-serif;--font-mono:"DM Mono",monospace;--font-arabic:"Noto Naskh Arabic",serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg);}
.logo{font-size:18px;font-weight:600;color:var(--gold)}
.logo span{color:var(--sand-dim);font-weight:300;font-style:italic;font-size:12px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}
.level-badge{font-family:var(--font-mono);font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:5px 11px;border-radius:20px;color:var(--gold);}
.notif-btn{font-family:var(--font-mono);font-size:10px;background:transparent;border:1px solid var(--border);padding:5px 11px;border-radius:20px;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.notif-btn.active{border-color:var(--green);color:var(--green)}
.notif-btn:hover{border-color:var(--gold);color:var(--gold)}

/* PROGRESS */
.progress-bar-wrap{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg)}
.progress-labels{display:flex;justify-content:space-between;font-size:10px;font-family:var(--font-mono);color:var(--text-dim);margin-bottom:5px}
.progress-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--pink));border-radius:3px;transition:width 1s ease}

main{max-width:700px;margin:0 auto;padding:24px 16px 100px}

/* SETUP SCREEN */
#setup-screen{text-align:center;padding:40px 20px}
.setup-title{font-size:28px;font-weight:600;color:var(--gold);margin-bottom:8px}
.setup-sub{font-size:14px;color:var(--text-dim);font-style:italic;margin-bottom:32px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:left}
.setup-label{font-family:var(--font-mono);font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.setup-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:12px 14px;border-radius:8px;outline:none;transition:border .15s;}
.setup-input:focus{border-color:var(--gold)}
.setup-hint{font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic}
.setup-warning{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:12px 16px;font-size:12px;color:#e74c3c;margin-top:12px;line-height:1.6}

/* LESSON CARD */
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.lesson-header{padding:20px 22px 16px;border-bottom:1px solid var(--border)}
.lesson-tag{font-family:var(--font-mono);font-size:9px;color:var(--gold);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.lesson-title{font-size:21px;font-weight:600;color:var(--sand);line-height:1.2}
.lesson-sub{font-size:12px;color:var(--text-dim);margin-top:4px;font-style:italic}
.lesson-ar{font-family:var(--font-arabic);font-size:26px;color:var(--gold);direction:rtl;text-align:right;margin-top:8px}

/* SECTION NAV */
.snav{display:flex;border-bottom:1px solid var(--border)}
.snav-btn{flex:1;padding:11px 4px;font-family:var(--font-mono);font-size:9px;background:none;border:none;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;margin-bottom:-1px;}
.snav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.tab-content{display:none;animation:fadeIn .3s ease}.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section{padding:20px 22px;border-bottom:1px solid var(--border)}.section:last-child{border-bottom:none}
.section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* CONTENT RENDERING */
.lesson-content{font-size:14px;line-height:1.8;color:var(--sand-dim)}
.lesson-content h3{font-size:15px;font-weight:600;color:var(--sand);margin:16px 0 8px}
.lesson-content .callout{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:13px;line-height:1.7;color:var(--sand-dim);}
.lesson-content strong{color:var(--sand)}
.lesson-content .ar-text{font-family:var(--font-arabic);font-size:20px;color:var(--gold);direction:rtl;text-align:right;display:block;margin:8px 0}
.lesson-content .translit{font-family:var(--font-mono);font-size:12px;color:var(--sand-dim);font-style:italic}

/* TABLE */
.grammar-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.grammar-table th{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.grammar-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.grammar-table tr:last-child td{border-bottom:none}
.grammar-table tr:hover td{background:var(--surface2)}
.ar-cell{font-family:var(--font-arabic);font-size:19px;color:var(--gold);direction:rtl;text-align:right}
.tr-cell{font-family:var(--font-mono);font-size:11px;color:var(--sand-dim);font-style:italic}

/* EXERCISES */
.exercise-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}.exercise-block:last-of-type{border-bottom:none}
.ex-label{font-family:var(--font-mono);font-size:9px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.ex-question{font-size:14px;color:var(--sand);margin-bottom:12px;line-height:1.6}
.mcq-options{display:flex;flex-direction:column;gap:7px}
.mcq-opt{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;cursor:pointer;font-size:13px;transition:all .15s;user-select:none;}
.mcq-opt:active{transform:scale(.98)}
.mcq-opt.correct{border-color:var(--green)!important;background:rgba(39,174,96,.1)!important;color:var(--green)!important}
.mcq-opt.wrong{border-color:var(--red)!important;background:rgba(192,57,43,.08)!important;color:var(--red)!important}
.mcq-opt .ar-opt{font-family:var(--font-arabic);font-size:17px;margin-left:auto;color:var(--gold)}
.text-input-wrap{display:flex;gap:8px;align-items:flex-start}
.arab-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-arabic);font-size:19px;padding:10px 13px;border-radius:8px;outline:none;direction:rtl;transition:border .15s;}
.arab-input:focus{border-color:var(--gold)}
.arab-input.correct{border-color:var(--green)!important;background:rgba(39,174,96,.06)}
.arab-input.wrong{border-color:var(--red)!important;background:rgba(192,57,43,.06)}
.feedback{margin-top:10px;font-size:12px;padding:9px 13px;border-radius:6px;display:none;font-family:var(--font-mono);line-height:1.5}
.feedback.ok{background:rgba(39,174,96,.1);color:var(--green);display:block}
.feedback.ko{background:rgba(192,57,43,.08);color:#e74c3c;display:block}

/* VOCAB */
.vocab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.vocab-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.vocab-card:active{transform:scale(.97)}
.v-ar{font-family:var(--font-arabic);font-size:23px;color:var(--gold);direction:rtl;display:block;margin-bottom:4px}
.v-tr{font-family:var(--font-mono);font-size:10px;color:var(--sand-dim);font-style:italic;display:block;margin-bottom:3px}
.v-fr{font-size:12px;color:var(--text);display:block;transition:filter .2s}
.v-fr.blurred{filter:blur(4px)}
.v-hint{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:5px;letter-spacing:.5px}

/* SRS */
.srs-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.srs-ar{font-family:var(--font-arabic);font-size:44px;color:var(--gold);direction:rtl;margin-bottom:12px}
.srs-q{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.srs-answer{font-size:15px;color:var(--sand);margin:14px 0;padding:10px 18px;background:var(--surface);border-radius:8px;display:none}
.srs-answer.show{display:block}
.srs-tr{font-family:var(--font-mono);font-size:12px;color:var(--sand-dim);font-style:italic;margin-top:4px}
.srs-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.srs-counter{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:16px}

/* BUTTONS */
.btn{font-family:var(--font-mono);font-size:11px;letter-spacing:.5px;padding:10px 20px;border-radius:8px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;user-select:none;}
.btn:active{transform:scale(.97)}
.btn:hover{background:var(--gold);color:var(--bg)}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-primary:hover{background:var(--gold-light)}
.btn-sm{padding:8px 14px;font-size:10px}
.btn-red{border-color:var(--red);color:var(--red)}.btn-red:hover{background:var(--red);color:#fff}
.btn-orange{border-color:#f39c12;color:#f39c12}.btn-orange:hover{background:#f39c12;color:#fff}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:#fff}

/* SCORE */
.score-wrap{display:flex;align-items:center;gap:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px}
.score-num{font-size:28px;font-weight:600;color:var(--gold);font-family:var(--font-mono)}
.score-lbl{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.5px}

/* LOADING */
.loading-wrap{text-align:center;padding:48px 20px}
.loading-ar{font-family:var(--font-arabic);font-size:36px;color:var(--gold);margin-bottom:12px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:var(--text-dim);font-style:italic}

/* COMPLETE */
.complete-wrap{text-align:center;padding:40px 20px}
.complete-icon{font-size:48px;margin-bottom:12px}
.complete-title{font-size:24px;font-weight:600;color:var(--gold);margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:24px}

/* QUIZ BANNER */
.quiz-banner{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;color:var(--sand-dim);}
.quiz-banner strong{color:var(--gold);font-size:12px;font-family:var(--font-mono);letter-spacing:.5px;display:block;margin-bottom:4px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50}
.bnav-btn{flex:1;padding:12px 4px 14px;font-family:var(--font-mono);font-size:9px;background:none;border:none;color:var(--text-dim);cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.5px;transition:color .15s;}
.bnav-btn.active{color:var(--gold)}
.bnav-icon{font-size:18px;display:block;margin-bottom:2px}

/* ERROR */
.error-box{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:10px;padding:16px 20px;font-size:13px;color:#e74c3c;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="logo">عربي <span>Irakien</span></div>
  <div class="header-right">
    <button class="notif-btn" id="notif-btn" onclick="requestNotifications()">🔔 Notifs</button>
    <div class="level-badge" id="level-badge">A1 · J1</div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-labels">
    <span id="prog-label">Début du parcours</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<main id="main-content">
  <!-- Contenu dynamique -->
</main>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-lesson" onclick="showView('lesson')">
    <span class="bnav-icon">📖</span>Leçon
  </button>
  <button class="bnav-btn" id="bnav-vocab" onclick="showView('vocab')">
    <span class="bnav-icon">📚</span>Vocab
  </button>
  <button class="bnav-btn" id="bnav-srs" onclick="showView('srs')">
    <span class="bnav-icon">🔁</span>Révision
  </button>
  <button class="bnav-btn" id="bnav-dico" onclick="showView('dico')">
    <span class="bnav-icon">🗂️</span>Dico
  </button>
  <button class="bnav-btn" id="bnav-settings" onclick="showView('settings')">
    <span class="bnav-icon">⚙️</span>Réglages
  </button>
</nav>

<script>
// ============================================================
// STATE
// ============================================================
let STATE = {
  apiKey: '',
  dayNumber: 1,
  totalDays: 0,
  level: 'A1',
  history: [], // [{day, title, vocab:[]}]
  currentLesson: null,
  currentView: 'lesson',
  notificationsEnabled: false,
  exerciseScores: {},
  srsQueue: [],
  srsIdx: 0,
  dicoSearch: '',
  srsBank: [],
  srsSessionDone: false,
  dialogueHistory: [],
  dialogueScenario: null,
};

const TOTAL_LESSONS_A1 = 40;
const TOTAL_LESSONS_A2 = 80;

// ============================================================
// PERSISTENCE
// ============================================================
function saveState(){
  try{ localStorage.setItem('arabi_state', JSON.stringify(STATE)); }catch(e){}
}
function loadState(){
  try{
    const s = localStorage.getItem('arabi_state');
    if(s){ STATE = {...STATE, ...JSON.parse(s)}; }
  }catch(e){}
}

// ============================================================
// INIT
// ============================================================
window.onload = function(){
  loadState();
  if(!STATE.apiKey){
    renderSetup();
  } else {
    initApp();
  }
};

function renderSetup(){
  document.getElementById('main-content').innerHTML = `
  <div id="setup-screen">
    <div style="font-family:var(--font-arabic);font-size:48px;color:var(--gold);margin-bottom:12px">مرحبا</div>
    <div class="setup-title">Bienvenue</div>
    <div class="setup-sub">Arabe irakien · A1 → A2 → B1</div>

    <div class="setup-card">
      <div class="setup-label">Clé API Anthropic</div>
      <input class="setup-input" type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <div class="setup-hint">Disponible sur console.anthropic.com → API Keys. Elle reste stockée uniquement sur ton téléphone.</div>
    </div>

    <div class="setup-warning">
      ⚠️ Assure-toi d'avoir fixé un plafond de dépense mensuel sur console.anthropic.com → Billing → Usage limits avant de continuer.
    </div>

    <div style="margin-top:20px">
      <button class="btn btn-primary" style="width:100%;padding:14px" onclick="saveApiKey()">Commencer l'apprentissage →</button>
    </div>
  </div>`;
}

function saveApiKey(){
  const key = document.getElementById('api-key-input').value.trim();
  if(!key.startsWith('sk-ant-') && !key.startsWith('sk-')){
    alert('Clé API invalide. Elle doit commencer par sk-ant-');
    return;
  }
  STATE.apiKey = key;
  STATE.dayNumber = 1;
  STATE.totalDays = 0;
  STATE.history = [];
  saveState();
  initApp();
}

function initApp(){
  updateProgressBar();
  checkDayAndLoad();
  scheduleNotification();
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgressBar(){
  const total = TOTAL_LESSONS_A1 + TOTAL_LESSONS_A2;
  const done = STATE.totalDays;
  const pct = Math.min(Math.round((done/total)*100), 100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';

  let lvl, lbl;
  if(done < TOTAL_LESSONS_A1){
    lvl = 'A1'; lbl = `A1 · Leçon ${done+1}/${TOTAL_LESSONS_A1}`;
  } else if(done < TOTAL_LESSONS_A1 + TOTAL_LESSONS_A2){
    lvl = 'A2'; lbl = `A2 · Leçon ${done-TOTAL_LESSONS_A1+1}/${TOTAL_LESSONS_A2}`;
  } else {
    lvl = 'B1'; lbl = `B1 en cours`;
  }
  STATE.level = lvl;
  document.getElementById('level-badge').textContent = lbl;
}

// ============================================================
// DAY CHECK — une leçon par jour
// ============================================================
function checkDayAndLoad(){
  const today = new Date().toDateString();
  const lastDay = STATE.lastLessonDate;

  if(STATE.currentLesson && lastDay === today){
    // Leçon déjà générée aujourd'hui
    renderLessonView();
  } else if(lastDay !== today){
    // Nouvelle journée → générer
    generateDailyLesson();
  } else {
    renderLessonView();
  }
}

// ============================================================
// GENERATE LESSON VIA CLAUDE API
// ============================================================
async function generateDailyLesson(){
  renderLoading();

  const day = STATE.dayNumber;
  const history = STATE.history.slice(-5).map(h => h.title).join(', ');
  const prevLesson = STATE.history.length > 0 ? STATE.history[STATE.history.length-1] : null;

  const level = STATE.level;
  const lessonNum = STATE.totalDays + 1;

  // Progression curriculum
  const a1Topics = [
    "les pronoms personnels (āna, inta, inti, huwwa, hiyya, iḥna, intu, humma)",
    "le verbe être en irakien (mâku verbe être explicite, utilisation des pronoms seuls)",
    "se présenter : nom, nationalité, ville",
    "les chiffres de 1 à 10",
    "les chiffres de 11 à 100",
    "la famille : père, mère, frère, sœur, fils, fille",
    "les jours de la semaine et les mois",
    "les couleurs essentielles",
    "le présent simple : verbes courants (yākul, yishrab, yirūḥ, yiji)",
    "la maison et les pièces",
    "les aliments et les boissons",
    "poser des questions simples (shunu, mīnu, wēn, shgadd)",
    "la négation (mā, mū, mâku)",
    "le passé simple : verbes courants",
    "le futur : rāḥ + verbe",
    "les adjectifs courants (kbīr, zghīr, zēn, mū zēn)",
    "les directions et se repérer dans la ville",
    "au marché : acheter et négocier",
    "la santé : chez le médecin",
    "le temps qu'il fait",
    "les transports (taksi, bās, sayyāra)",
    "au restaurant : commander un repas",
    "les vêtements",
    "les professions",
    "les loisirs et hobbies",
    "exprimer ses goûts (aḥib, mā aḥib)",
    "les prépositions de lieu (fōg, taḥat, jiddam, wara)",
    "parler de sa journée",
    "le téléphone et les messages",
    "révision A1 complète + mini-dialogue",
  ];

  const a2Topics = [
    "le duel et le pluriel irrégulier",
    "les pronoms suffixes (possessifs : bayti, bētak...)",
    "les verbes à double complément",
    "exprimer la durée et la fréquence",
    "la forme passive en irakien",
    "les subordonnées temporelles (lamma, baad mā)",
    "exprimer la cause (li'ann, mishan)",
    "exprimer le but",
    "les comparatifs et superlatifs",
    "les nombres ordinaux",
    "parler de ses projets et ambitions",
    "décrire une personne physiquement",
    "décrire le caractère de quelqu'un",
    "raconter une histoire au passé",
    "rapporter les paroles de quelqu'un",
    "exprimer des opinions et les défendre",
    "vocabulaire professionnel et bureau",
    "écrire un message formel",
    "comprendre et donner des instructions complexes",
    "révision A2 + conversation libre",
  ];

  let topicToTeach;
  if(lessonNum <= a1Topics.length){
    topicToTeach = a1Topics[lessonNum-1];
  } else if(lessonNum <= a1Topics.length + a2Topics.length){
    topicToTeach = a2Topics[lessonNum - a1Topics.length - 1];
  } else {
    topicToTeach = `conversation avancée B1 - thème libre de niveau B1 en arabe irakien (leçon ${lessonNum})`;
  }

  const quizInstructions = prevLesson ? `
QUIZ SUR LA LEÇON PRÉCÉDENTE (obligatoire, avant la nouvelle leçon) :
La leçon précédente portait sur : "${prevLesson.title}"
Génère 3 questions de quiz sur cette leçon. Format JSON strict dans le champ "quiz".
` : '';

  const prompt = `Tu es un professeur expert en arabe irakien dialectal (dialecte de Bagdad).
Tu dois générer la leçon numéro ${lessonNum} pour un apprenant francophone de niveau ${level}.

Sujet de cette leçon : ${topicToTeach}
Leçons déjà vues : ${history || 'aucune'}

${quizInstructions}

Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans balises, sans texte avant ou après.

Structure JSON obligatoire :
{
  "title": "titre court de la leçon en français",
  "titleAr": "titre en arabe",
  "tag": "${level} · Leçon ${lessonNum}",
  "quiz": ${prevLesson ? `[
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "a", "explanation": "..."},
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "b", "explanation": "..."},
    {"question": "...", "options": ["a) ...", "b) ...", "c) ...", "d) ..."], "correct": "c", "explanation": "..."}
  ]` : 'null'},
  "explanation": "Explication claire en français, 3-4 paragraphes. Style direct et pédagogique. Mentionne les particularités irakiennes vs arabe standard. Durée de lecture : 5-7 minutes.",
  "table": [
    {"ar": "arabe", "tr": "translittération", "fr": "français", "example": "phrase exemple courte"},
    ...8 à 10 entrées...
  ],
  "tip": "Une astuce ou règle mémo-technique courte et percutante",
  "exercises": [
    {
      "type": "mcq",
      "question": "Question en français",
      "options": [
        {"key": "a", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "b", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "c", "ar": "arabe", "tr": "translit", "fr": "français"},
        {"key": "d", "ar": "arabe", "tr": "translit", "fr": "français"}
      ],
      "correct": "b",
      "explanation": "Explication de la bonne réponse"
    },
    {
      "type": "mcq",
      "question": "Deuxième question",
      "options": [...],
      "correct": "c",
      "explanation": "..."
    },
    {
      "type": "fill",
      "question": "Traduisez en arabe : [phrase courte]",
      "hint": "translittération pour aider",
      "answer": "réponse en arabe",
      "answerAlt": ["variante acceptable si existe", ""],
      "explanation": "Explication"
    },
    {
      "type": "fill",
      "question": "Traduisez en arabe : [autre phrase]",
      "hint": "translittération",
      "answer": "réponse",
      "answerAlt": [],
      "explanation": "Explication"
    }
  ],
  "vocab": [
    {"ar": "mot", "tr": "translit", "fr": "français"},
    ...8 mots...
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': STATE.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if(!response.ok){
      const err = await response.json();
      throw new Error(err.error?.message || 'Erreur API');
    }

    const data = await response.json();
    let text = data.content.map(c => c.text || '').join('');

    // Clean JSON
    text = text.replace(/```json|```/g, '').trim();
    const lesson = JSON.parse(text);

    // Save
    STATE.currentLesson = lesson;
    STATE.lastLessonDate = new Date().toDateString();
    STATE.history.push({ day: STATE.dayNumber, title: lesson.title, vocab: lesson.vocab });
    STATE.totalDays = STATE.history.length;
    STATE.dayNumber++;
    STATE.exerciseScores = {};
    STATE.srsQueue = [];
    STATE.srsIdx = 0;
    STATE.srsSessionDone = false;
    STATE.dialogueHistory = [];
    STATE.dialogueScenario = null;
    srsAddVocab(lesson.vocab||[], lesson.title||'');
    saveState();
    updateProgressBar();
    renderLessonView();

  } catch(e) {
    renderError(e.message);
  }
}

// DICTIONARY VIEW — tous les mots appris, leçon par leçon
// ============================================================
function renderDicoView(){
  const history = STATE.history || [];
  const allWords = [];
  history.forEach(h => {
    if(h.vocab && h.vocab.length){
      h.vocab.forEach(w => allWords.push({...w, lesson: h.title, day: h.day}));
    }
  });

  const total = allWords.length;

  // Filtre + recherche
  const searchVal = STATE.dicoSearch || '';
  const filtered = searchVal
    ? allWords.filter(w =>
        w.fr?.toLowerCase().includes(searchVal.toLowerCase()) ||
        w.ar?.includes(searchVal) ||
        w.tr?.toLowerCase().includes(searchVal.toLowerCase()) ||
        w.lesson?.toLowerCase().includes(searchVal.toLowerCase())
      )
    : allWords;

  // Grouper par leçon
  const byLesson = {};
  filtered.forEach(w => {
    const key = w.lesson || 'Leçon inconnue';
    if(!byLesson[key]) byLesson[key] = [];
    byLesson[key].push(w);
  });

  let groupsHTML = '';
  if(filtered.length === 0){
    groupsHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim);font-style:italic">
      ${total === 0 ? 'Aucun mot encore appris. Commence ta première leçon !' : 'Aucun résultat pour cette recherche.'}
    </div>`;
  } else {
    // Affichage inversé : leçons les plus récentes en premier
    const lessonKeys = Object.keys(byLesson).reverse();
    groupsHTML = lessonKeys.map(lesson => `
      <div style="margin-bottom:24px">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px">
          ${lesson}
          <span style="color:var(--text-dim)">(${byLesson[lesson].length} mots)</span>
          <span style="flex:1;height:1px;background:var(--border);display:block"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px">
          ${byLesson[lesson].map(w => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border-radius:7px;transition:background .15s" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='var(--surface2)'">
            <span style="font-family:var(--font-arabic);font-size:20px;color:var(--gold);min-width:60px;text-align:right;direction:rtl">${w.ar}</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--sand-dim);font-style:italic;min-width:90px">${w.tr}</span>
            <span style="font-size:13px;color:var(--text)">${w.fr}</span>
          </div>`).join('')}
        </div>
      </div>`).join('');
  }

  document.getElementById('main-content').innerHTML = `
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Dictionnaire personnel</div>
      <div class="lesson-title">Mots appris</div>
      <div class="lesson-sub">${total} mot${total>1?'s':''} · ${history.length} leçon${history.length>1?'s':''} complétée${history.length>1?'s':''}</div>
    </div>
    <div style="padding:14px 18px;border-bottom:1px solid var(--border)">
      <input
        type="search"
        placeholder="Rechercher un mot (français, arabe, translit.)…"
        value="${searchVal}"
        oninput="STATE.dicoSearch=this.value; renderDicoView()"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:10px 14px;border-radius:8px;outline:none;"
        onfocus="this.style.borderColor='var(--gold)'"
        onblur="this.style.borderColor='var(--border)'"
      >
    </div>
    <div style="padding:16px 18px 24px">
      ${total > 0 ? `<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-bottom:16px">${filtered.length} résultat${filtered.length>1?'s':''} · ordre antéchronologique</div>` : ''}
      ${groupsHTML}
    </div>
  </div>`;
}

    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')

    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

        <span>${o}</span>
      </div>`).join('')}
    </div>
  </div>`).join('');

let quizSelections = {};
function selectQuizOption(i, el, key){
  if(quizSelections[i] !== undefined) return;
  quizSelections[i] = key;
  el.style.borderColor = 'var(--gold)';
}

function submitQuiz(){
  const L = STATE.currentLesson;
  if(!L || !L.quiz) return;
  let score = 0;
  L.quiz.forEach((q, i) => {
    const opts = document.querySelectorAll(`#quiz-mcq-${i} .mcq-opt`);
    const selected = quizSelections[i];
    opts.forEach(o => {
      o.style.pointerEvents = 'none';
      const key = o.textContent.trim()[0].toLowerCase();
      if(key === q.correct) o.classList.add('correct');
      else if(selected && key === selected) o.classList.add('wrong');
    });
    if(selected === q.correct) score++;
  });
  const fb = document.getElementById('quiz-feedback');
  const pct = Math.round((score/L.quiz.length)*100);
  fb.className = score === L.quiz.length ? 'feedback ok' : 'feedback ko';
  fb.textContent = `${score}/${L.quiz.length} — ${pct >= 67 ? '✓ Bien joué !' : '✗ À revoir — consulte la leçon d\'hier.'}`;
}

// ============================================================
// EXERCISES
// ============================================================
function checkMCQ(i, el, choice){
  const L = STATE.currentLesson;
  const ex = L.exercises[i];
  const opts = el.parentElement.querySelectorAll('.mcq-opt');
  opts.forEach(o => o.style.pointerEvents = 'none');
  const fb = document.getElementById('fb-'+i);
  if(choice === ex.correct){
    el.classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = '✓ ' + (ex.explanation || 'Correct !');
    STATE.exerciseScores[i] = 1;
  } else {
    el.classList.add('wrong');
    opts.forEach(o => { if(o.querySelector('[style]')?.textContent === ex.correct+')' || o.textContent.trim().startsWith(ex.correct+')')) o.classList.add('correct'); });
    fb.className = 'feedback ko';
    fb.textContent = '✗ ' + (ex.explanation || 'Pas tout à fait.');
    STATE.exerciseScores[i] = 0;
  }
  saveState();
}

function norm(s){
  return (s||'').toLowerCase().trim().replace(/[\u0300-\u036f]/g,'');
}
function checkFill(i){
  const L = STATE.currentLesson;
  const ex = L.exercises[i];
  const inp = document.getElementById('fill-'+i);
  const val = inp.value.trim();
  const fb = document.getElementById('fb-'+i);
  const accepted = [ex.tr, ex.answer, ...(ex.answerAlt||[])].filter(Boolean);
  const match = accepted.some(a => norm(a) === norm(val));
  if(match){
    inp.style.borderColor = 'var(--green)';
    fb.className = 'feedback ok';
    fb.textContent = '✓ ' + (ex.explanation||'Parfait !') + (ex.tr ? ' ('+ex.tr+')' : '');
    STATE.exerciseScores[i] = 1;
  } else {
    inp.style.borderColor = 'var(--red)';
    fb.className = 'feedback ko';
    fb.textContent = 'Reponse : ' + (ex.tr||ex.answer) + ' — ' + (ex.explanation||'');
    STATE.exerciseScores[i] = 0;
    setTimeout(()=>{ inp.style.borderColor='var(--border)'; inp.value=''; }, 2000);
  }
  saveState();
}

function scoreExercises(){
  const L = STATE.currentLesson;
  const total = L.exercises.length;
  let got = Object.values(STATE.exerciseScores).filter(v=>v===1).length;
  const sd = document.getElementById('score-display');
  sd.style.display = 'flex';
  document.getElementById('score-num').textContent = got+'/'+total;
  sd.scrollIntoView({behavior:'smooth'});
}

function resetExercises(){
  STATE.exerciseScores = {};
  saveState();
  renderLessonView();
  showTab(1);
}

// SRS BANK (SM-2 cross-lecons)
// ============================================================
function srsAddVocab(vocabArr, lessonTitle){
  const now = Date.now();
  const existing = new Set(STATE.srsBank.map(w=>w.ar));
  (vocabArr||[]).forEach(v=>{
    if(!existing.has(v.ar)){
      STATE.srsBank.push({ar:v.ar,tr:v.tr,fr:v.fr,lesson:lessonTitle,due:now,interval:1,easeFactor:2.5,reps:0});
    }
  });
  saveState();
}
function srsGetDue(){
  return STATE.srsBank.filter(w=>w.due<=Date.now()).sort((a,b)=>a.due-b.due);
}
function srsRate(word,rating){
  const q={hard:1,ok:3,easy:5}[rating];
  const w=STATE.srsBank.find(x=>x.ar===word.ar);
  if(!w)return;
  if(q<3){w.reps=0;w.interval=1;}
  else{
    w.easeFactor=Math.max(1.3,w.easeFactor+0.1-(5-q)*(0.08+(5-q)*0.02));
    w.interval=w.reps===0?1:w.reps===1?6:Math.round(w.interval*w.easeFactor);
    w.reps++;
  }
  w.due=Date.now()+w.interval*86400000;
  saveState();
}

function renderSRSView(){
  if(STATE.currentLesson&&STATE.currentLesson.vocab) srsAddVocab(STATE.currentLesson.vocab,STATE.currentLesson.title);

  if(!STATE.srsQueue||STATE.srsQueue.length===0||STATE.srsSessionDone){
    STATE.srsQueue=due.slice(0,20);STATE.srsIdx=0;STATE.srsSessionDone=false;saveState();
  }
  const dc=due.length;
  document.getElementById('main-content').innerHTML=`

      </div>
      <div id="srs-done" style="display:none" class="complete-wrap">

      </div>`}
    </div>
  </div>`;
  if(dc>0) showSRSCard();
}
function showSRSCard(){
  const q=STATE.srsQueue;
  if(STATE.srsIdx>=q.length){endSRS();return;}
  const w=q[STATE.srsIdx];
  const g=id=>document.getElementById(id);
  if(g('srs-ltag'))g('srs-ltag').textContent=w.lesson||'';
  if(g('srs-ar'))g('srs-ar').textContent=w.ar;
  if(g('srs-fr'))g('srs-fr').textContent=w.fr;
  if(g('srs-tr'))g('srs-tr').textContent=w.tr;
  if(g('srs-answer'))g('srs-answer').classList.remove('show');
  if(g('srs-reveal'))g('srs-reveal').style.display='';
  if(g('srs-btns'))g('srs-btns').style.display='none';
  if(g('srs-counter'))g('srs-counter').textContent='Carte '+(STATE.srsIdx+1)+' / '+q.length;
}
function revealSRS(){
  document.getElementById('srs-answer').classList.add('show');
  document.getElementById('srs-reveal').style.display='none';
  document.getElementById('srs-btns').style.display='flex';
}
function rateSRS(rating){
  srsRate(STATE.srsQueue[STATE.srsIdx],rating);
  STATE.srsIdx++;saveState();showSRSCard();
}
function restartSRS(){
  STATE.srsQueue=[];STATE.srsSessionDone=false;saveState();renderSRSView();
}
function endSRS(){
  STATE.srsSessionDone=true;saveState();
  const c=document.getElementById('srs-card');
  const d=document.getElementById('srs-done');
  if(c)c.style.display='none';
  if(d)d.style.display='block';
}

// ============================================================
// DIALOGUE VIEW
// ============================================================
const DIALOGUE_SCENARIOS=[
  {id:"taxi",emoji:"🚕",label:"Dans un taxi",context:"Tu prends un taxi a Bagdad. Le chauffeur te demande ou tu vas."},
  {id:"marche",emoji:"🛒",label:"Au marche",context:"Tu fais des courses dans un souk. Le vendeur propose ses produits."},
  {id:"cafe",emoji:"☕",label:"Au cafe",context:"Tu commandes dans un cafe irakien. Le serveur bavarde avec toi."},
  {id:"voisin",emoji:"👋",label:"Avec un voisin",context:"Tu croises ton voisin irakien. Il demande comment tu vas."},
  {id:"telephone",emoji:"📱",label:"Coup de telephone",context:"Tu appelles un ami irakien pour fixer un rendez-vous."},
  {id:"libre",emoji:"🎲",label:"Situation libre",context:"Claude choisit une situation adaptee a ton niveau."},
];
function renderDialogueView(){
  if(!STATE.dialogueScenario) renderDialogueScenarioPicker();
  else renderDialogueChat();
}
function renderDialogueScenarioPicker(){
  document.getElementById('main-content').innerHTML=`
  <div class="lesson-card">
    <div class="lesson-header">
      <div class="lesson-tag">Dialogue oral</div>
      <div class="lesson-title">Choisis une situation</div>
      <div class="lesson-sub">Claude joue un irakien natif · tape en translitteration</div>
    </div>
    <div class="section">
      <div style="display:flex;flex-direction:column;gap:10px">
        ${DIALOGUE_SCENARIOS.map(s=>`
        <div onclick="startDialogue('${s.id}')"
          style="display:flex;align-items:center;gap:14px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border .15s"
          onmouseover="this.style.borderColor='var(--orange)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="font-size:22px">${s.emoji}</span>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--sand)">${s.label}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${s.context}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
async function startDialogue(scenarioId){
  STATE.dialogueScenario=DIALOGUE_SCENARIOS.find(s=>s.id===scenarioId);
  STATE.dialogueHistory=[];saveState();
  renderDialogueChat();
  await sendDialogueMessage(null);
}
function renderDialogueChat(){
  const s=STATE.dialogueScenario;
  document.getElementById('main-content').innerHTML=`
  <div class="lesson-card">
    <div class="lesson-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="lesson-tag">Dialogue · ${s.emoji} ${s.label}</div>
        <div class="lesson-title" style="font-size:17px">Conversation</div>
        <div class="lesson-sub">Tape en translitteration · ex: ana bseer</div>
      </div>
      <button class="btn btn-sm" onclick="endDialogue()">Quitter</button>
    </div>
    <div id="dlg-msgs" style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:180px;max-height:50vh;overflow-y:auto"></div>
    <div style="padding:12px 16px;border-top:2px solid var(--border);display:flex;gap:8px">
      <input type="text" id="dlg-input" placeholder="ana, shloonak, maku mushkila..."
        style="flex:1;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:14px;padding:10px 12px;border-radius:10px;outline:none;"
        onkeydown="if(event.key==='Enter')sendUserDialogue()">
      <button class="btn btn-primary btn-sm" onclick="sendUserDialogue()">→</button>
    </div>
    <div style="padding:8px 16px 14px;text-align:center">
      <button class="btn btn-sm" onclick="requestDialogueCorrection()" style="border-color:var(--pink);color:var(--pink)">Demander correction</button>
    </div>
  </div>`;
  STATE.dialogueHistory.forEach(m=>appendDlgMsg(m.role,m.content));
}
function appendDlgMsg(role,content){
  const c=document.getElementById('dlg-msgs');if(!c)return;
  c.querySelectorAll('.dlg-loading').forEach(d=>d.remove());
  const isUser=role==='user';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:'+(isUser?'flex-end':'flex-start')+';gap:2px';
  const lbl=document.createElement('div');
  lbl.style.cssText='font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin:0 4px';
  lbl.textContent=isUser?'Toi':'Locuteur irakien';
  const bubble=document.createElement('div');
  bubble.style.cssText='max-width:85%;padding:10px 14px;border-radius:'+(isUser?'14px 14px 4px 14px':'14px 14px 14px 4px')+';font-family:var(--font-arabic);font-size:17px;direction:rtl;line-height:1.6;background:'+(isUser?'var(--orange)':'var(--surface2)')+';color:'+(isUser?'#fff':'var(--sand)')+';border:'+(isUser?'none':'2px solid var(--border)')+';';
  bubble.textContent=content;
  wrap.appendChild(lbl);wrap.appendChild(bubble);c.appendChild(wrap);
  c.scrollTop=c.scrollHeight;
}
function appendDlgLoading(){
  const c=document.getElementById('dlg-msgs');if(!c)return;
  const d=document.createElement('div');d.className='dlg-loading';
  d.style.cssText='padding:8px 4px;color:var(--text-dim);font-size:18px;letter-spacing:3px';
  d.textContent='...';c.appendChild(d);c.scrollTop=c.scrollHeight;
}
async function sendUserDialogue(){
  const inp=document.getElementById('dlg-input');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  STATE.dialogueHistory.push({role:'user',content:text});saveState();
  appendDlgMsg('user',text);
  await sendDialogueMessage(text);
}
async function sendDialogueMessage(userMsg){
  appendDlgLoading();
  const s=STATE.dialogueScenario;
  const recentVocab=STATE.history.slice(-3).flatMap(h=>h.vocab||[]).map(v=>v.tr).join(', ');
  const sys="Tu es un locuteur natif irakien (dialecte de Bagdad). Role: "+s.context+" Reponds uniquement en arabe dialectal irakien, phrases courtes, niveau "+STATE.level+". L'utilisateur tape en translitteration latine, comprends-le. Ne corrige pas maintenant. Vocabulaire connu: "+(recentVocab||'basique');
  const msgs=[...STATE.dialogueHistory];
  if(!userMsg)msgs.push({role:'user',content:'Commence la conversation.'});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':STATE.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:250,system:sys,messages:msgs})});
    const data=await r.json();
    const reply=(data.content||[]).map(c=>c.text||'').join('')||'...';
    STATE.dialogueHistory.push({role:'assistant',content:reply});saveState();
    appendDlgMsg('assistant',reply);
  }catch(e){appendDlgMsg('assistant','(Erreur connexion)');}
}
async function requestDialogueCorrection(){
  if(STATE.dialogueHistory.length<2){alert("Echange quelques messages d'abord !");return;}
  appendDlgLoading();
  const userMsgs=STATE.dialogueHistory.filter(m=>m.role==='user').map(m=>m.content).join(' / ');
  const prompt="Voici les reponses d'un apprenant francophone niveau "+STATE.level+" en dialogue irakien : "+userMsgs+". Fais une correction pedagogique en francais : 1. Ce qui etait correct 2. Les erreurs et corrections 3. Expressions plus naturelles 4. Note sur 5 et encouragement en arabe irakien.";
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':STATE.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const correction=(data.content||[]).map(c=>c.text||'').join('');
    const c=document.getElementById('dlg-msgs');if(!c)return;
    c.querySelectorAll('.dlg-loading').forEach(d=>d.remove());
    const div=document.createElement('div');
    div.style.cssText='background:rgba(212,32,96,.06);border:2px solid rgba(212,32,96,.2);border-radius:12px;padding:14px 16px;margin-top:8px';
    const t=document.createElement('div');t.style.cssText='font-family:var(--font-mono);font-size:10px;color:var(--pink);margin-bottom:8px';t.textContent='Correction';
    const b=document.createElement('div');b.style.cssText='font-size:13px;color:var(--sand);line-height:1.7;white-space:pre-wrap';b.textContent=correction;
    div.appendChild(t);div.appendChild(b);c.appendChild(div);c.scrollTop=c.scrollHeight;
  }catch(e){alert('Erreur correction');}
}
function endDialogue(){
  STATE.dialogueScenario=null;STATE.dialogueHistory=[];saveState();renderDialogueView();
}

// ============================================================
// NOTIFICATIONS (PWA)
// ============================================================
async function requestNotifications(){
  if(!('Notification' in window)){
    alert('Les notifications ne sont pas supportées sur ce navigateur. Essaie d\'ajouter l\'app à ton écran d\'accueil Android depuis Chrome.');
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    STATE.notificationsEnabled = true;
    saveState();
    document.getElementById('notif-btn').classList.add('active');
    document.getElementById('notif-btn').textContent = '🔔 OK';
    scheduleNotification();
    new Notification('عربي — Arabe irakien', {
      body: 'Notifications activées ! Tu recevras ta leçon chaque matin à 8h00.',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>'
    });
  } else {
    alert('Permission refusée. Active les notifications dans les réglages de Chrome.');
  }
}

function scheduleNotification(){
  if(!STATE.notificationsEnabled) return;
  if(!('Notification' in window) || Notification.permission !== 'granted') return;

  // Calcule le délai jusqu'à 8h00 demain
  const now = new Date();
  const next8 = new Date();
  next8.setHours(8, 0, 0, 0);
  if(now >= next8) next8.setDate(next8.getDate() + 1);
  const delay = next8 - now;

  setTimeout(()=>{
    const lastDate = STATE.lastLessonDate;
    const today = new Date().toDateString();
    if(lastDate !== today){
      new Notification('عربي — Leçon du jour prête !', {
        body: `Bonjour ! Ta leçon d'arabe irakien t'attend. ${STATE.level} · Leçon ${STATE.totalDays+1}`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>',
        requireInteraction: true
      });
    }
    scheduleNotification(); // Replanifie pour demain
  }, delay);

  document.getElementById('notif-btn').classList.add('active');
  document.getElementById('notif-btn').textContent = '🔔 8h00';
}

// Init notif button state
if(STATE.notificationsEnabled){
  document.getElementById('notif-btn').classList.add('active');
  document.getElementById('notif-btn').textContent = '🔔 8h00';
}
</script>
